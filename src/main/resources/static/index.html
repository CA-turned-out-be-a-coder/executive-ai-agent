<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Dolly</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
    <header>
        <div class="nameplate">
            <button type="button" id="menu-toggle-btn" aria-label="Toggle chat list">☰</button>
            <img src="logo.png" alt="Dolly" class="logo">
            <div class="nameplate-text">
                <span class="eyebrow">Executive Assistant</span>
                <h1>Dolly</h1>
            </div>
        </div>
        <div id="auth-status"></div>
    </header>

    <div id="login-screen" class="hidden">
        <div class="login-card">
            <img src="logo.png" alt="Dolly" class="login-logo">
            <span class="eyebrow">Welcome</span>
            <p>Sign in to let Dolly manage your calendar and inbox.</p>
            <a href="/oauth2/authorization/google" class="login-btn">Sign in with Google</a>
        </div>
    </div>

    <div id="main-screen" class="hidden">
        <div id="sidebar-backdrop"></div>

        <aside id="sidebar">
            <button type="button" id="new-chat-btn">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                <span>New chat</span>
            </button>

            <span class="eyebrow sidebar-section-label">Recents</span>
            <div id="conversation-list"></div>

            <button type="button" id="profile-row">
                <span id="profile-avatar-fallback"></span>
                <img id="profile-avatar-img" class="hidden" alt="">
                <span id="profile-row-name"></span>
            </button>
        </aside>

        <div id="profile-popover" class="hidden">
            <img id="popover-avatar-img" class="hidden" alt="">
            <span id="popover-avatar-fallback"></span>
            <div class="profile-details">
                <div id="popover-name"></div>
                <div id="popover-email"></div>
            </div>
            <button type="button" id="logout-btn">Log out</button>
        </div>

        <div id="chat-screen">
            <div id="messages"></div>
            <div id="file-preview-wrap" class="hidden">
                <img id="image-preview" alt="Selected image preview" class="hidden">
                <div id="doc-preview" class="hidden">
                    <span id="doc-preview-icon">📄</span>
                    <span id="doc-preview-name"></span>
                </div>
                <button type="button" id="remove-image-btn" title="Remove file">&times;</button>
            </div>
            <form id="chat-form">
                <input type="file" id="image-input" accept="image/*,application/pdf,.pdf,.xlsx,.xls,.docx,.csv,.txt,text/plain,text/csv,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.wordprocessingml.document" class="hidden">
                <button type="button" id="attach-btn" title="Attach a file">📎</button>
                <button type="button" id="mic-btn" title="Speak to Dolly">🎤</button>
                <input type="text" id="message-input" placeholder="Ask Dolly about your calendar, email, or anything else..." autocomplete="off" />
                <button type="submit">Send</button>
            </form>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
