openai.api.key=${OPENAI_API_KEY}

spring.datasource.url=jdbc:postgresql://localhost:5432/aiassistant
spring.datasource.username=aiassistant_user
spring.datasource.password=localdevpassword

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email,https://www.googleapis.com/auth/gmail.readonly,https://www.googleapis.com/auth/calendar