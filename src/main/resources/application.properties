openai.api.key=${OPENAI_API_KEY}

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/aiassistant}
spring.datasource.username=${DATABASE_USERNAME:aiassistant_user}
spring.datasource.password=${DATABASE_PASSWORD:localdevpassword}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email,https://www.googleapis.com/auth/calendar,https://www.googleapis.com/auth/gmail.readonly,https://www.googleapis.com/auth/gmail.send,https://www.googleapis.com/auth/gmail.compose

server.servlet.session.tracking-modes=cookie
server.forward-headers-strategy=framework
twelvedata.api.key=${TWELVEDATA_API_KEY}
