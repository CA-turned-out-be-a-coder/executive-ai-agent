services:
  postgres:
    image: postgres:16
    container_name: ai-assistant-postgres
    environment:
      POSTGRES_DB: aiassistant
      POSTGRES_USER: aiassistant_user
      POSTGRES_PASSWORD: localdevpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: